<!DOCTYPE html>
<html>
<head>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
	
.header-limpio {
background-color: #000;
height: 100px;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
position: relative;
}
	
@keyframes aparecer {
0% { opacity: 0; letter-spacing: 20px; filter: blur(5px); }
100% { opacity: 1; letter-spacing: 6px; filter: blur(0); }
}
	
.header-limpio h1 {
font-family: 'Arial Black', Gadget, sans-serif;
font-size: 35px;
color: #fff;
text-transform: uppercase;
letter-spacing: 6px;
animation: aparecer 1.2s ease-out;
transition: 0.4s;
cursor: default;
}
	
.header-limpio:hover h1 {
letter-spacing: 12px;
opacity: 0.7;
}
	
.caja-logo {
position: absolute;
left: 20px;
top: 50%;
transform: translateY(-50%);
}
	
.foto-logo {
width: 65px;
height: auto;
transition: transform 0.4s;
cursor: pointer;
}
	
.foto-logo:hover {
transform: scale(1.15) rotate(5deg);
}
	
.caja-audio {
position: absolute;
right: 20px;
top: 50%;
transform: translateY(-50%);
}
	
audio {
height: 30px;
width: 200px;
opacity: 0.6;
}
	
</style>
</head>
<body>
<header class="header-limpio">
<div class="caja-logo">
<img src="Imagenbtpi (1).png" class="foto-logo" alt="Logo">
</div>
	
<h1>BTPI</h1>
<div class="caja-audio">
<audio controls>
<source src="Graduacion.mp3" type="audio/mpeg">
</audio>
</div>
</header>
</body>
</html>
